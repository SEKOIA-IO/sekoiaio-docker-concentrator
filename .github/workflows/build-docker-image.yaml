name: Build Docker image

on:
  workflow_dispatch:
  push:
    branches:
    - main
  schedule:
    - cron: "0 7 * * 1"

permissions: {}

jobs:
  build:
    permissions:
      contents: read  # for docker/build-push-action to access repository contents
      packages: write  # for docker/login-action to push images to GHCR
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Login to GitHub Container Registry
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push to GitHub Packages
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      with:
        push: true
        tags: |
          ghcr.io/sekoia-io/sekoiaio-docker-concentrator:latest
          ghcr.io/sekoia-io/sekoiaio-docker-concentrator:2.7.4
